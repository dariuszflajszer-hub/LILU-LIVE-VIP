<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILU VIP CLUB</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:28px;
box-shadow:0 20px 50px rgba(0,0,0,.12);
text-align:center;
width:360px;
}

img{
width:170px;
margin-bottom:20px;
}

h1{
color:#8b0f2d;
margin:0 0 10px;
font-size:42px;
}

p{
color:#555;
font-size:20px;
margin-bottom:30px;
}

button{
background:#8b0f2d;
color:white;
border:none;
padding:18px 30px;
font-size:20px;
border-radius:14px;
cursor:pointer;
}
</style>
</head>

<body>
<div class="box">
<img src="serce-3.jpg">
<h1>LILU VIP CLUB</h1>
<p>Powiadomienia przed live butikowym</p>
<button>Włącz powiadomienia</button>
</div>
  <script src="config.js"></script>
<script>
if (LIVE_CONFIG.isLive) {
  document.querySelector("h1").innerText = "🔴 LIVE JUŻ TRWA";
  document.querySelector("p").innerText = "Dołącz teraz do transmisji";
  document.querySelector("button").innerText = "DOŁĄCZ TERAZ";

  document.querySelector("button").onclick = function () {
    window.location.href = LIVE_CONFIG.liveUrl;
  };
} else {
  document.querySelector("p").innerText =
    "Następny live: " + LIVE_CONFIG.nextLiveText;
}
</script>
</body>
</html>
