<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILU VIP CLUB</title>

<link rel="manifest" href="manifest.webmanifest?v=3">
<link rel="icon" href="lilu-icon-192.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:14px;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#fff7fa,#eadde2);
}
.app{
width:100%;
max-width:390px;
height:92vh;
max-height:780px;
border-radius:34px;
background:linear-gradient(180deg,#fff,#fff5f8);
box-shadow:0 24px 60px rgba(98,9,31,.22);
padding:22px 22px 20px;
text-align:center;
position:relative;
display:flex;
flex-direction:column;
}
.bell{
position:absolute;
top:18px;
right:18px;
width:46px;
height:46px;
border-radius:50%;
background:#fff;
box-shadow:0 10px 24px rgba(98,9,31,.14);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}
.logo{
width:165px;
margin:22px auto 18px;
filter:drop-shadow(0 14px 18px rgba(141,17,49,.25));
}
h1{
font-size:34px;
letter-spacing:.1em;
color:#84112d;
font-weight:900;
line-height:1.05;
margin-bottom:18px;
}
.card{
background:rgba(255,255,255,.86);
border-radius:26px;
padding:22px 18px;
box-shadow:0 14px 34px rgba(98,9,31,.12);
margin-bottom:22px;
}
.status{
font-size:27px;
font-weight:900;
letter-spacing:.03em;
margin-bottom:12px;
color:#111;
}
.dot{
display:inline-block;
width:20px;
height:20px;
border-radius:50%;
background:#e52b45;
margin-right:10px;
vertical-align:middle;
}
.info{
font-size:21px;
line-height:1.3;
color:#51464a;
}
button{
margin-top:auto;
width:100%;
border:none;
border-radius:24px;
padding:21px 18px;
background:linear-gradient(180deg,#b01543,#61091f);
color:#fff;
font-size:25px;
font-weight:900;
letter-spacing:.04em;
box-shadow:0 16px 34px rgba(141,17,49,.35);
}
.note{
font-size:13px;
color:#806e74;
margin-top:15px;
}
.build{
font-size:10px;
color:#c8b8be;
margin-top:8px;
}
</style>
</head>

<body>
<main class="app">
<div class="bell">🔔</div>

<img src="serce-3.jpg" class="logo" alt="LILU LIVE">

<h1>LILU VIP CLUB</h1>

<section class="card">
<div class="status" id="status"></div>
<div class="info" id="info"></div>
</section>

<button id="mainBtn"></button>

<div class="note">Bez spamu. Tylko informacje o live.</div>
<div class="build">BUILD LUX 002</div>
</main>

<script src="config.js?v=3"></script>

<script>
const statusEl = document.getElementById("status");
const infoEl = document.getElementById("info");
const btn = document.getElementById("mainBtn");

if (LIVE_CONFIG.isLive === true) {
statusEl.innerHTML = '<span class="dot"></span>LIVE JUŻ TRWA';
infoEl.innerText = "Dołącz teraz do transmisji na żywo";
btn.innerText = "DOŁĄCZ TERAZ";
btn.onclick = () => { window.location.href = LIVE_CONFIG.liveUrl; };
} else {
statusEl.innerText = "⏰ NAJBLIŻSZY LIVE";
infoEl.innerText = LIVE_CONFIG.nextLiveText;
btn.innerText = "WŁĄCZ POWIADOMIENIA";
btn.onclick = () => { alert("Powiadomienia będą dostępne w kolejnym etapie."); };
}
</script>
</body>
</html>
