<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILU VIP CLUB</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#fff7fa,#ffeef4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.app{
width:100%;
max-width:420px;
background:#ffffff;
border-radius:28px;
padding:28px;
box-shadow:0 20px 50px rgba(0,0,0,.12);
text-align:center;
position:relative;
}

.bell{
position:absolute;
top:18px;
right:18px;
font-size:22px;
cursor:pointer;
}

.logo{
width:180px;
margin:10px auto 18px;
display:block;
}

h1{
font-size:34px;
color:#8d1131;
margin-bottom:14px;
}

.status{
font-size:22px;
font-weight:bold;
margin-bottom:12px;
color:#222;
}

.info{
font-size:18px;
color:#666;
margin-bottom:28px;
line-height:1.4;
}

button{
width:100%;
border:none;
padding:18px;
border-radius:16px;
font-size:20px;
font-weight:bold;
cursor:pointer;
background:#8d1131;
color:white;
box-shadow:0 10px 25px rgba(141,17,49,.25);
}

button:hover{
opacity:.95;
}
</style>
</head>

<body>

<div class="app">
<div class="bell">🔔</div>

<img src="serce-3.jpg" class="logo">

<h1>LILU VIP CLUB</h1>

<div class="status" id="status"></div>
<div class="info" id="info"></div>

<button id="mainBtn"></button>
</div>

<script src="config.js"></script>

<script>
const statusEl = document.getElementById("status");
const infoEl = document.getElementById("info");
const btn = document.getElementById("mainBtn");

if (LIVE_CONFIG.isLive === true) {
statusEl.innerText = "🔴 LIVE JUŻ TRWA";
infoEl.innerText = "Dołącz teraz do transmisji na żywo";
btn.innerText = "DOŁĄCZ TERAZ";

btn.onclick = () => {
window.location.href = LIVE_CONFIG.liveUrl;
};

} else {
statusEl.innerText = "⏰ NAJBLIŻSZY LIVE";
infoEl.innerText = LIVE_CONFIG.nextLiveText;
btn.innerText = "WŁĄCZ POWIADOMIENIA";

btn.onclick = () => {
alert("Powiadomienia będą dostępne w kolejnym etapie.");
};
}
</script>

</body>
</html>
