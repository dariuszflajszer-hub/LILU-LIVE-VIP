<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#fff4f8;color:#2b1820}
body{display:flex;align-items:center;justify-content:center;padding:0;background:radial-gradient(circle at 50% 10%,#ffffff 0,#fff7fa 33%,#ffeef5 64%,#fff9fb 100%)}
.app{width:100%;max-width:430px;min-height:100svh;position:relative;overflow:hidden;text-align:center;padding:18px 24px 18px;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,#ffffff 0%,#fff8fb 34%,#fff4f8 66%,#fffafd 100%)}

.bell{position:absolute;top:18px;right:22px;width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.94);display:flex;align-items:center;justify-content:center;font-size:25px;box-shadow:0 14px 34px rgba(105,22,45,.12);z-index:3;cursor:pointer}
.bell:after{content:"";position:absolute;top:10px;right:9px;width:14px;height:14px;border-radius:50%;background:#ec2e61;box-shadow:0 0 0 5px rgba(236,46,97,.08)}
.logo{width:176px;margin:72px auto 20px;display:block;filter:drop-shadow(0 18px 24px rgba(150,17,55,.28));position:relative;z-index:1}
h1{font-size:clamp(25px,6.3vw,34px);line-height:1.1;letter-spacing:.055em;font-weight:900;color:#8d1131;margin:4px 0 24px;white-space:nowrap;position:relative;z-index:1;cursor:pointer;border:2px solid #d0a13b;border-radius:20px;padding:15px 22px;background:rgba(255,255,255,.42);box-shadow:0 10px 28px rgba(141,17,49,.10),0 0 0 1px rgba(255,255,255,.88) inset,0 0 0 4px rgba(208,161,59,.16) inset,inset 0 1px 0 rgba(255,255,255,.9)}
h1:active{transform:scale(.985)}
h1.inviteHidden{display:none}
.divider{width:78%;display:flex;align-items:center;gap:18px;margin:0 auto 26px;color:#c79a4f;position:relative;z-index:1}.divider:before,.divider:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,#d4a75c,transparent)}.divider span{font-size:35px;line-height:1;color:#d0a05a}.divider.hourglass{margin-top:8px;margin-bottom:28px}.divider.hourglass span{display:flex;align-items:center;justify-content:center}.app.soonView .divider.hourglass{margin-top:58px;margin-bottom:46px}.hourglassArt{width:86px;height:auto;display:block;filter:drop-shadow(0 12px 16px rgba(133,82,12,.24))}
.liveBox{width:100%;padding:22px 8px 28px;margin:0 0 26px;position:relative;z-index:1}.status{font-size:clamp(28px,7.4vw,36px);font-weight:900;letter-spacing:.06em;color:#7d102e;line-height:1.15;margin-bottom:18px;white-space:nowrap}.dot{display:inline-block;width:19px;height:19px;border-radius:50%;background:#ec2e61;margin-right:12px;vertical-align:middle;box-shadow:0 0 22px rgba(236,46,97,.35);animation:pulse 1.15s ease-in-out infinite}@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.26);opacity:.85}100%{transform:scale(1);opacity:1}}.info{font-size:clamp(22px,6vw,30px);line-height:1.35;color:#3d3035;font-weight:400}.info.off{font-weight:700;color:#8d1131}
.cta{width:100%;border:2px solid #d0a13b;border-radius:26px;padding:22px 20px;margin-top:auto;background:linear-gradient(180deg,#c4144d 0%,#8f0e32 52%,#67091f 100%);color:#fff;font-size:clamp(26px,7vw,36px);font-weight:900;letter-spacing:.08em;box-shadow:0 18px 42px rgba(150,17,55,.36),0 0 0 2px rgba(255,238,164,.95) inset,0 0 0 5px rgba(170,112,22,.58) inset,0 0 18px rgba(255,221,113,.46) inset,inset 0 1px 0 rgba(255,255,255,.28);cursor:pointer;position:relative;z-index:1}.cta.inactive{opacity:.92;cursor:default}.vip{margin-top:20px;font-size:17px;color:#6b555d;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;z-index:1}.vip span{color:#c79a4f}.small-divider{width:58%;display:flex;align-items:center;gap:17px;margin:24px auto 18px;color:#c79a4f;position:relative;z-index:1}.small-divider:before,.small-divider:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,#d4a75c,transparent)}.note{font-size:18px;color:#7a626b;line-height:1.3;position:relative;z-index:1}.build{font-size:13px;letter-spacing:.18em;color:#d686a3;margin-top:18px;position:relative;z-index:1}
.shareModal{display:none;position:fixed;inset:0;background:rgba(25,5,13,.78);z-index:9999;padding:18px;overflow:auto}.shareCard{max-width:420px;margin:18px auto;background:linear-gradient(180deg,#fff 0%,#fff5f9 58%,#ffeef5 100%);border-radius:28px;padding:24px 22px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.35)}.shareHeart{font-size:34px;margin-bottom:8px}.shareTitle{font-size:28px;line-height:1.12;color:#8d1131;margin-bottom:12px;font-weight:900}.shareText{font-size:20px;color:#4b2a35;line-height:1.35;margin-bottom:18px;font-weight:700}.shareQr{width:270px;max-width:92%;border-radius:18px;margin:0 auto 18px;display:block}.shareSteps{font-size:16px;color:#6b555d;line-height:1.55;background:rgba(255,255,255,.65);border-radius:18px;padding:14px}.shareClose{margin-top:18px;padding:14px 28px;border:2px solid #d0a13b;border-radius:18px;background:#8d1131;color:white;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 0 0 2px rgba(255,238,164,.85) inset,0 0 0 4px rgba(170,112,22,.45) inset}
@media (max-height:740px){.app{padding:12px 22px}.bell{width:50px;height:50px}.logo{width:142px;margin-top:52px;margin-bottom:14px}h1{font-size:22px;margin-bottom:16px;padding:13px 18px;border-radius:18px}.divider{margin-bottom:18px}.app.soonView .divider.hourglass{margin-top:40px;margin-bottom:32px}.hourglassArt{width:70px;height:auto}.liveBox{padding:18px 6px 20px;margin-bottom:18px}.status{font-size:25px;margin-bottom:12px}.info{font-size:21px}.cta{padding:19px 16px;font-size:25px}.vip{margin-top:13px}.small-divider{margin:16px auto 10px}.note{font-size:15px}.build{display:none}.shareCard{margin:8px auto;padding:18px}.shareQr{width:230px}.shareTitle{font-size:24px}.shareText{font-size:17px}.shareSteps{font-size:14px}}
@media (max-width:370px){.app{padding-left:18px;padding-right:18px}.logo{width:150px}h1{font-size:21px;padding:12px 14px}.status{font-size:24px}.info{font-size:20px}.cta{font-size:23px}}
</style>
</head>
<body>
<main class="app">
  <div class="bell" id="bell" aria-label="Powiadomienia">🔔</div>
  <img src="serce-logo-png.png" class="logo" alt="LILU LIVE">
  <h1 id="inviteTitle">ZAPROŚ PRZYJACIÓŁKĘ</h1>
  <div class="divider" id="mainDivider"><span id="dividerIcon">♡</span></div>

  <section class="liveBox">
    <div class="status" id="status"></div>
    <div class="info" id="info"></div>
  </section>

  <button class="cta" id="mainBtn"><span id="btnText"></span></button>

  <div class="vip"><span>♙</span> Tylko dla członków VIP</div>
  <div class="small-divider">◇</div>
  <div class="note">Bez spamu. Tylko informacje o live.</div>
  <div class="build">BUILD FIRESTORE ADMIN 001</div>
</main>

<div id="shareModal" class="shareModal">
  <div class="shareCard">
    <div class="shareHeart">❤️</div>
    <div class="shareTitle">Podziel się sercem LILU</div>
    <div class="shareText">Podaruj dostęp naprawdę wyjątkowej Kobiecie.</div>
    <img src="qr-lilu-share.png" class="shareQr" alt="Kod QR LILU VIP CLUB">
    <div class="shareSteps">
      <strong>📱 Dołącz w minutę</strong><br><br>
      1. Zeskanuj kod<br>
      2. Dodaj aplikację do ekranu<br>
      3. Włącz powiadomienia 🔔
    </div>
    <button class="shareClose" id="shareCloseBtn">Zamknij</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:'AIzaSyBltvLoVpGmLKNojphA60RxeVRbClqpnIQ',authDomain:'lilu-vip-club.firebaseapp.com',projectId:'lilu-vip-club',storageBucket:'lilu-vip-club.firebasestorage.app',messagingSenderId:'1032950167061',appId:'1:1032950167061:web:fe66d06c8411241a6a401c'};
firebase.initializeApp(firebaseConfig);
const messaging=firebase.messaging();
const db=firebase.firestore();
const vapidKey='BIdRTKcm_ku5wTjR3JqK8l5sPANcLyDwCnZjcDQ4lGAfihgWQRFMgzLKq4XqrXQQfpQZMLdTxqPOFEq0Tb-L1dw';

const app = document.querySelector(".app");
const statusEl = document.getElementById("status");
const infoEl = document.getElementById("info");
const btn = document.getElementById("mainBtn");
const btnText = document.getElementById("btnText");
const shareModal = document.getElementById("shareModal");
const mainDivider = document.getElementById("mainDivider");
const dividerIcon = document.getElementById("dividerIcon");
const inviteTitle = document.getElementById("inviteTitle");
const goldHourglass = `<img src="hourglass-lilu.png" class="hourglassArt" alt="Złota klepsydra">`;

function setDividerIcon(icon, isHourglass) {
  if (isHourglass) dividerIcon.innerHTML = icon;
  else dividerIcon.innerText = icon;
  mainDivider.classList.toggle("hourglass", isHourglass);
}

function renderApp(LIVE_CONFIG) {
  infoEl.classList.remove("off");
  btn.classList.remove("inactive");
  app.classList.remove("soonView");
  inviteTitle.classList.remove("inviteHidden");
  setDividerIcon("♡", false);

  const mode = LIVE_CONFIG.liveMode || (LIVE_CONFIG.isLive === true ? "live" : (LIVE_CONFIG.liveSoon === true ? "soon" : "replay"));

  if (mode === "live") {
    statusEl.innerHTML = '<span class="dot"></span>LIVE JUŻ TRWA';
    infoEl.innerText = "Dołącz teraz do transmisji na żywo";
    btnText.innerText = "DOŁĄCZ TERAZ";
    btn.onclick = () => {
      if (LIVE_CONFIG.liveUrl) window.location.href = LIVE_CONFIG.liveUrl;
      else alert("Link LIVE nie został jeszcze ustawiony.");
    };
    return;
  }

  if (mode === "soon") {
    app.classList.add("soonView");
    inviteTitle.classList.add("inviteHidden");
    setDividerIcon(goldHourglass, true);
    statusEl.innerText = "ZACZYNAMY ZA 15 MIN.";
    infoEl.innerText = "";
    infoEl.classList.add("off");
    btnText.innerText = "TRWAJĄ OSTATNIE PRZYGOTOWANIA";
    btn.classList.add("inactive");
    btn.onclick = () => {};
    return;
  }

  statusEl.innerText = "RETRANSMISJA";
  infoEl.innerText = "ZOBACZ! zanim znikną wszystkie stylizacje";
  infoEl.classList.add("off");

  if (LIVE_CONFIG.replayUrl) {
    btnText.innerText = "OGLĄDAJ POWTÓRKĘ";
    btn.onclick = () => { window.location.href = LIVE_CONFIG.replayUrl; };
  } else {
    btnText.innerText = "WŁĄCZ POWIADOMIENIA";
    btn.onclick = enablePush;
  }
}

async function loadFreshConfig() {
  try {
    const snap = await db.collection('settings').doc('live').get();
    if (snap.exists) {
      renderApp(snap.data());
      return;
    }
    throw new Error('Brak danych Firestore');
  } catch (firestoreError) {
    try {
      const response = await fetch("config.js?t=" + Date.now(), { cache: "no-store" });
      const configText = await response.text();
      const match = configText.match(/const\s+LIVE_CONFIG\s*=\s*({[\s\S]*?});/);
      if (!match) throw new Error("Brak LIVE_CONFIG");
      const LIVE_CONFIG = Function("return " + match[1])();
      renderApp(LIVE_CONFIG);
    } catch (error) {
      statusEl.innerText = "BŁĄD KONFIGURACJI";
      infoEl.innerText = "Odśwież aplikację lub spróbuj ponownie za chwilę.";
      btnText.innerText = "ODŚWIEŻ";
      btn.onclick = () => window.location.reload();
    }
  }
}

function startLiveAutoRefresh(){
  try {
    db.collection('settings').doc('live').onSnapshot(snapshot => {
      if (snapshot.exists) renderApp(snapshot.data());
    }, error => {
      console.warn('Live auto-refresh fallback:', error);
      setInterval(loadFreshConfig, 30000);
    });
  } catch (e) {
    console.warn('Live auto-refresh unavailable:', e);
    setInterval(loadFreshConfig, 30000);
  }
}

async function enablePush(){
  try{
    if (!('Notification' in window) || !('serviceWorker' in navigator)) {
      alert('To urządzenie nie obsługuje powiadomień web push.');
      return;
    }
    const permission = await Notification.requestPermission();
    if(permission !== 'granted'){
      alert('Brak zgody na powiadomienia.');
      return;
    }
    const reg = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
    const token = await messaging.getToken({vapidKey:vapidKey, serviceWorkerRegistration:reg});
    localStorage.setItem('fcmToken', token);
    alert('Powiadomienia włączone.');
    console.log('FCM TOKEN:', token);
  }catch(e){
    console.error(e);
    alert('Błąd konfiguracji powiadomień.');
  }
}

inviteTitle.onclick = () => { shareModal.style.display = 'block'; };
document.getElementById('shareCloseBtn').onclick = () => { shareModal.style.display = 'none'; };
shareModal.onclick = (event) => { if (event.target === shareModal) shareModal.style.display = 'none'; };
document.getElementById('bell').onclick = enablePush;
loadFreshConfig();
startLiveAutoRefresh();
</script>
</body>
</html>
