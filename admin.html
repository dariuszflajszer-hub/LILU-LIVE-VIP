<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Panel Admina LILU VIP CLUB</title>
<style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:#10040a;color:#fff;display:flex;justify-content:center}.wrap{width:100%;max-width:430px;padding:22px;background:radial-gradient(circle at top,#2a0717 0,#10040a 45%,#070306 100%);min-height:100vh}h1{margin:18px 0 4px;text-align:center;color:#f4c978;letter-spacing:.18em;font-size:34px;font-weight:400}.sub{text-align:center;color:#ff4f9a;font-weight:700;letter-spacing:.08em;margin-bottom:24px}.card{border:1px solid rgba(255,79,154,.34);background:rgba(255,255,255,.045);border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 20px 50px rgba(0,0,0,.3)}label{display:block;margin:12px 0 7px;color:#ffd5e7;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}input,textarea{width:100%;border:1px solid rgba(255,79,154,.35);background:#16080f;color:#fff;border-radius:14px;padding:14px;font-size:15px;outline:none}textarea{min-height:76px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{width:100%;border:0;border-radius:18px;padding:15px 16px;margin-top:12px;background:linear-gradient(180deg,#ff2d8a,#b20f53);color:#fff;font-weight:900;font-size:16px;letter-spacing:.04em;cursor:pointer}.btn.off{background:#2a2a2a}.status{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:900;color:#ff4f9a}.dot{width:15px;height:15px;border-radius:50%;background:#ff174f}.muted{color:#c9aebb;font-size:13px;line-height:1.4}.hidden{display:none}.ok{color:#65ff9d}.err{color:#ff6d6d}.top{display:flex;justify-content:space-between;align-items:center}.logout{background:transparent;border:0;color:#ffd5e7;text-decoration:underline;cursor:pointer}</style>
</head><body><div class='wrap'><h1>LILU</h1><div class='sub'>PANEL ADMINA VIP CLUB</div><section id='loginBox' class='card'><label>Email</label><input id='email' type='email'><label>Hasło</label><input id='password' type='password'><button class='btn' id='loginBtn'>ZALOGUJ</button><p id='loginMsg' class='muted'></p></section><section id='adminBox' class='hidden'><div class='card top'><div><div class='status'><span class='dot'></span><span id='liveLabel'>LIVE OFF</span></div><div class='muted'>Zarządzanie ekranem użytkowniczek</div></div><button class='logout' id='logoutBtn'>Wyloguj</button></div><div class='card'><label>Status live</label><div class='row'><button class='btn' id='liveOnBtn'>LIVE ON</button><button class='btn off' id='liveOffBtn'>LIVE OFF</button></div><label>Link LIVE</label><input id='liveUrl'><label>Link retransmisji</label><input id='replayUrl'><label>Tekst gdy live nie trwa</label><textarea id='nextLiveText'>Obserwuj powiadomienia. Poinformujemy Cię o kolejnym live.</textarea><button class='btn' id='saveBtn'>ZAPISZ ZMIANY</button><p id='saveMsg' class='muted'></p></div></section></div><script src='https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js'></script><script src='https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js'></script><script src='https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js'></script><script>const firebaseConfig={apiKey:'AIzaSyBltvLoVpGmLKNojphA60RxeVRbClqpnIQ',authDomain:'lilu-vip-club.firebaseapp.com',projectId:'lilu-vip-club',storageBucket:'lilu-vip-club.firebasestorage.app',messagingSenderId:'1032950167061',appId:'1:1032950167061:web:fe66d06c8411241a6a401c'};firebase.initializeApp(firebaseConfig);const auth=firebase.auth();const db=firebase.firestore();const docRef=db.collection('settings').doc('live');let isLive=false;const $=id=>document.getElementById(id);function showMsg(id,text,cls=''){ $(id).className='muted '+cls;$(id).innerText=text;}function updateStatus(){$('liveLabel').innerText=isLive?'LIVE ON':'LIVE OFF';}async function loadData(){const snap=await docRef.get();if(snap.exists){const d=snap.data();isLive=!!d.isLive;$('liveUrl').value=d.liveUrl||'';$('replayUrl').value=d.replayUrl||'';$('nextLiveText').value=d.nextLiveText||'Obserwuj powiadomienia.';}updateStatus();}$('loginBtn').onclick=async()=>{try{await auth.signInWithEmailAndPassword($('email').value.trim(),$('password').value);showMsg('loginMsg','');}catch(e){showMsg('loginMsg','Błąd logowania','err');}};$('logoutBtn').onclick=()=>auth.signOut();$('liveOnBtn').onclick=()=>{isLive=true;updateStatus();};$('liveOffBtn').onclick=()=>{isLive=false;updateStatus();};$('saveBtn').onclick=async()=>{try{await docRef.set({isLive,liveUrl:$('liveUrl').value.trim(),replayUrl:$('replayUrl').value.trim(),nextLiveText:$('nextLiveText').value.trim(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});showMsg('saveMsg','Zapisano','ok');}catch(e){showMsg('saveMsg','Błąd zapisu','err');}};auth.onAuthStateChanged(async user=>{if(user){$('loginBox').classList.add('hidden');$('adminBox').classList.remove('hidden');await loadData();}else{$('adminBox').classList.add('hidden');$('loginBox').classList.remove('hidden');}});</script><script src='admin-stats.js'></script></body></html>
